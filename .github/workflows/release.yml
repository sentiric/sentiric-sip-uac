name: Multi-Platform UAC CI/CD

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: 2. Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 4. Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi

      - name: 5. Install Build Tools & Linux Dependencies
        run: |
          sudo apt-get update
          # Android ve Linux (GTK) için tüm sistem kütüphaneleri
          sudo apt-get install -y ninja-build libasound2-dev protobuf-compiler clang cmake pkg-config libgtk-3-dev
          cargo install flutter_rust_bridge_codegen --version 2.11.1
          cargo install cargo-ndk

      - name: 6. Build Native Core (Rust)
        run: |
          flutter pub get
          flutter_rust_bridge_codegen generate
          
          # Android Derlemesi
          export ANDROID_NDK_HOME=$ANDROID_NDK_LATEST_HOME
          cd rust
          cargo ndk -t arm64-v8a -t armeabi-v7a -o ../android/app/src/main/jniLibs build --release
          cd ..
          
          # C++ Runtime Kopyalama (Android için)
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          find $ANDROID_NDK_HOME -name "libc++_shared.so" | grep "aarch64" | head -n 1 | xargs -I {} cp {} android/app/src/main/jniLibs/arm64-v8a/
          
          mkdir -p android/app/src/main/jniLibs/armeabi-v7a
          find $ANDROID_NDK_HOME -name "libc++_shared.so" | grep "arm-linux-androideabi" | head -n 1 | xargs -I {} cp {} android/app/src/main/jniLibs/armeabi-v7a/

      - name: 7. Build Android APK
        run: flutter build apk --release --split-per-abi

      - name: 8. Build Linux Desktop
        run: |
          # Linux Rust derlemesini ve kopyalamasını Makefile'ımızdan çağırıyoruz
          make build-linux
          # Çıktı klasörünü paketle
          cd build/linux/x64/release/bundle
          tar -czvf ../../../../../sentiric-sip-uac-linux-x64.tar.gz .
          cd ../../../../..

      - name: 9. Rename Artifacts for Release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk sentiric-sip-uac-android-arm64-${{ github.ref_name }}.apk
          mv build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk sentiric-sip-uac-android-armv7-${{ github.ref_name }}.apk
          mv sentiric-sip-uac-linux-x64.tar.gz sentiric-sip-uac-linux-x64-${{ github.ref_name }}.tar.gz

      - name: 10. Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sentiric-sip-uac-android-arm64-*.apk
            sentiric-sip-uac-android-armv7-*.apk
            sentiric-sip-uac-linux-x64-*.tar.gz
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}