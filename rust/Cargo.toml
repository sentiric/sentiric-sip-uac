[package]
name = "mobile_uac"
version = "0.2.2" # BUMP VERSION
edition = "2021"

[lib]
crate-type = ["cdylib", "staticlib"]

[dependencies]
# SDK v0.3.0'a yükseltildi
sentiric-telecom-client-sdk = { git = "https://github.com/sentiric/sentiric-telecom-client-sdk.git", tag = "v0.3.2" }

# Bridge ve Utils
flutter_rust_bridge = "=2.11.1"
tokio = { version = "1", features = ["full"] }
anyhow = "1.0"
tracing = "0.1"
android_logger = "0.13"
log = "0.4"