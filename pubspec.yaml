name: sentiric_sip_uac
description: "Sentiric Mobile SIP UAC for field testing and validation."
publish_to: 'none'

version: 1.4.0+9

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_rust_bridge: 2.11.1
  permission_handler: ^11.3.1  
  rename_app: ^1.6.5
  flutter_launcher_icons: ^0.14.4
  # [YENİ]: Verileri (Caller ID, IP vb.) kaydetmek için
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:


  uses-material-design: true

flutter_launcher_icons:
  android: true
  image_path: "assets/icon.png"
